name: IDIS Dashboard Update

on:
  schedule:
    - cron: '0 0 * * *'    # 매일 GMT 00:00 = KST 09:00
  workflow_dispatch:
  push:
    paths:
      - '*.xls'
      - '*.xlsx'
      - 'data/**'

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install pandas openpyxl lxml requests google-api-python-client google-auth

      - name: 폴더 생성
        run: mkdir -p output

      - name: 파이프라인 실행
        env:
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          GDRIVE_FOLDER_ID:  ${{ secrets.GDRIVE_FOLDER_ID }}
          GDRIVE_CREDENTIALS: ${{ secrets.GDRIVE_CREDENTIALS }}
        run: python run_pipeline.py --skip-download --data-dir . --upload-gdrive

      - name: 결과 확인
        if: always()
        run: ls -la output/ || echo "없음"

      - name: 아티팩트 저장
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-data-${{ github.run_number }}
          path: output/
          retention-days: 7
