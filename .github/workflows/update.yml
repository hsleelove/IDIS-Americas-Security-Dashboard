name: IDIS Dashboard Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: 현재 위치 및 파일 목록 확인
        run: |
          echo "현재 경로: $(pwd)"
          echo "=== 전체 파일 목록 ==="
          ls -la
          echo "=== py 파일만 ==="
          find . -name "*.py" | head -20

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests pandas openpyxl lxml

      - name: 폴더 생성
        run: mkdir -p output

      - name: 파이프라인 실행
        env:
          NS_EMAIL:     ${{ secrets.NS_EMAIL }}
          NS_PASSWORD:  ${{ secrets.NS_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python run_pipeline.py \
            --skip-download \
            --data-dir . \
            --upload-github

      - name: 결과 확인
        if: always()
        run: ls -la output/ || echo "output 폴더 없음"

      - name: 아티팩트 저장
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-data-${{ github.run_number }}
          path: output/
          retention-days: 7
