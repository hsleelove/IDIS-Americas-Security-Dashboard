name: IDIS Dashboard Update

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install requests pandas openpyxl lxml selenium webdriver-manager

      - name: Chrome & ChromeDriver 설치
        run: |
          # Chrome 설치
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update -q
          sudo apt-get install -y google-chrome-stable
          
          # 버전 확인
          CHROME_VER=$(google-chrome --version | grep -oP '[\d.]+' | head -1)
          echo "설치된 Chrome: $CHROME_VER"
          
          # ChromeDriver 설치 (버전 맞춤)
          pip install chromedriver-binary-auto

      - name: 폴더 생성
        run: mkdir -p output data

      - name: 파이프라인 실행
        env:
          NS_EMAIL:     ${{ secrets.NS_EMAIL }}
          NS_PASSWORD:  ${{ secrets.NS_PASSWORD }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python run_pipeline.py --upload-github

      - name: 결과 확인
        if: always()
        run: |
          echo "=== output ===" && ls -la output/ || echo "없음"
          echo "=== data ===" && ls -la data/ || echo "없음"

      - name: 아티팩트 저장
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dashboard-data-${{ github.run_number }}
          path: output/
          retention-days: 7
